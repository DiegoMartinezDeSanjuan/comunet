# Production Docker Compose — COMUNET
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d --build
#
# This stack includes:
# - PostgreSQL 16 with tuned settings (32 GB RAM server)
# - PgBouncer connection pooler
# - Valkey (Redis-compatible) for cache, rate limiting & JWT blocklist
# - MinIO S3-compatible storage (optional, can be replaced with AWS S3)
#
# IMPORTANT: All services except 'app' and 'minio' (S3 API) are internal-only.
# PostgreSQL, PgBouncer, Valkey and MinIO Console are NOT exposed to the host.
# Cloudflare Tunnel only routes to :3000 (app) and :9000 (minio API).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comunet-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - pgbouncer
      - valkey
      - minio

  postgres:
    image: postgres:16-alpine
    container_name: comunet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: comunet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: comunet
    # No ports exposed to host — only accessible via Docker network
    volumes:
      - comunet_pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c" 
      - "max_connections=200"
      - "-c"
      - "shared_buffers=4GB"
      - "-c"
      - "effective_cache_size=12GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_statement=none"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comunet"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: comunet-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://comunet:${POSTGRES_PASSWORD}@postgres:5432/comunet"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    # No ports exposed to host — only app connects via Docker network
    depends_on:
      postgres:
        condition: service_healthy

  # Valkey — Redis-compatible cache with AOF persistence
  # Used for: rate limiting, JWT blocklist, session revocation
  #
  # Policy: noeviction — if memory fills, new writes fail but existing
  # blocklist entries are preserved. This is critical for security:
  # allkeys-lru could evict jwt:bl:{jti} keys, making revoked tokens valid again.
  valkey:
    image: valkey/valkey:8-alpine
    container_name: comunet-valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory", "128mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - comunet_valkey:/data
    # No ports exposed to host — only app connects via Docker network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: S3-compatible storage for documents
  # Remove this if using AWS S3 or Cloudflare R2
  minio:
    image: minio/minio:latest
    container_name: comunet-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - comunet_minio:/data
    ports:
      # S3 API — exposed for Cloudflare Tunnel (s3.dominio.ext)
      - '9000:9000'
    # Console NOT exposed — access only via docker exec or SSH tunnel
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    container_name: comunet-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/comunet-documents || true;
      exit 0;
      "

volumes:
  comunet_pgdata:
  comunet_valkey:
  comunet_minio:
