# Production Docker Compose — COMUNET
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#
# This stack includes:
# - PostgreSQL 16 with tuned settings
# - PgBouncer connection pooler
# - MinIO S3-compatible storage (optional, can be replaced with AWS S3)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comunet-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - pgbouncer
      - minio

  postgres:
    image: postgres:16-alpine
    container_name: comunet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: comunet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comunet_prod_secret}
      POSTGRES_DB: comunet
    ports:
      - '5432:5432'
    volumes:
      - comunet_pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c" 
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_statement=none"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comunet"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: comunet-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://comunet:${POSTGRES_PASSWORD:-comunet_prod_secret}@postgres:5432/comunet"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    ports:
      - '6432:5432'
    depends_on:
      postgres:
        condition: service_healthy

  # Optional: S3-compatible storage for documents
  # Remove this if using AWS S3 or Cloudflare R2
  minio:
    image: minio/minio:latest
    container_name: comunet-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-comunet-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-comunet-minio-secret}
    volumes:
      - comunet_minio:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    container_name: comunet-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-comunet-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-comunet-minio-secret}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/comunet-documents || true;
      exit 0;
      "
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  comunet_pgdata:
  comunet_minio:
